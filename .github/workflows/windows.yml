name: Windows packages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  QT_VERSION: "6.10.2"
  MERCURY_MODEM_REPO: "pepefrog1234/mercury"
  MERCURY_MODEM_TAG: "fork-c4272747"
  MERCURY_MODEM_ASSET: "mercury-1.9.8-w64-c4272747.zip"
  MERCURY_MODEM_COMMIT: "c4272747"
  HAMLIB_TAG: "4.7.1"
  HAMLIB_ASSET: "hamlib-w64-4.7.1.zip"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
            msvc_arch: x64
            qt_arch: win64_msvc2022_64
            qt_dir: msvc2022_64
            run_tests: true
          - arch: arm64
            cmake_arch: ARM64
            msvc_arch: amd64_arm64
            qt_arch: win64_msvc2022_arm64_cross_compiled
            qt_dir: msvc2022_arm64
            run_tests: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install aqt
        run: python -m pip install --upgrade aqtinstall

      - name: Patch aqt ARM64 script updater
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import aqt.updater

          path = Path(aqt.updater.__file__)
          text = path.read_text()
          old = (
              '        def patch_script(script_name):\n'
              '            script_path = self.prefix / "bin" / (script_name + ".bat" if os_name.startswith("windows") else script_name)\n'
              '            self.logger.info(f"Patching {script_path}")\n'
              '            for unpatched in unpatched_paths():\n'
              '                self._patch_textfile(script_path, f"{unpatched}bin", patched, is_executable=True)\n'
          )
          new = (
              '        def patch_script(script_name):\n'
              '            script_path = self.prefix / "bin" / (script_name + ".bat" if os_name.startswith("windows") else script_name)\n'
              '            if not script_path.exists():\n'
              '                self.logger.debug(f"Skipping missing Qt script {script_path}")\n'
              '                return\n'
              '            self.logger.info(f"Patching {script_path}")\n'
              '            for unpatched in unpatched_paths():\n'
              '                self._patch_textfile(script_path, f"{unpatched}bin", patched, is_executable=True)\n'
          )
          if old not in text:
              raise SystemExit("aqt updater patch target not found")
          path.write_text(text.replace(old, new))
          print(f"Patched {path}")
          '@ | python -

      - name: Install Qt
        shell: pwsh
        run: |
          $qtRoot = "$env:RUNNER_TEMP\Qt"
          if ("${{ matrix.arch }}" -eq "arm64") {
            python -m aqt install-qt windows desktop $env:QT_VERSION win64_msvc2022_64 `
              -O "$qtRoot" `
              -m qtmultimedia `
              --timeout 30
          }

          python -m aqt install-qt windows desktop $env:QT_VERSION "${{ matrix.qt_arch }}" `
            -O "$qtRoot" `
            -m qtmultimedia `
            --timeout 30

      - name: Configure
        shell: pwsh
        run: |
          $qtRoot = "$env:RUNNER_TEMP\Qt\$env:QT_VERSION"
          $qtTarget = "$qtRoot\${{ matrix.qt_dir }}"
          $qtHost = "$qtRoot\msvc2022_64"
          if (!(Test-Path $qtHost)) {
            $qtHost = $qtTarget
          }
          cmake -S . -B build-windows-${{ matrix.arch }} `
            -A "${{ matrix.cmake_arch }}" `
            -DCMAKE_PREFIX_PATH="$qtTarget" `
            -DQT_HOST_PATH="$qtHost" `
            -DMERCURYCHAT_USE_HAMLIB=OFF

      - name: Build
        run: cmake --build build-windows-${{ matrix.arch }} --config Release --parallel

      - name: Test
        if: matrix.run_tests
        shell: pwsh
        run: |
          $qtBin = "$env:RUNNER_TEMP\Qt\$env:QT_VERSION\${{ matrix.qt_dir }}\bin"
          $env:PATH = "$qtBin;$env:PATH"
          ctest --test-dir build-windows-${{ matrix.arch }} -C Release --output-on-failure

      - name: Download forked Mercury modem
        shell: pwsh
        run: |
          $downloadRoot = "$env:RUNNER_TEMP\mercury-modem"
          New-Item -ItemType Directory -Force -Path $downloadRoot | Out-Null

          $repo = $env:MERCURY_MODEM_REPO
          $tag = $env:MERCURY_MODEM_TAG
          $asset = $env:MERCURY_MODEM_ASSET
          $url = "https://github.com/$repo/releases/download/$tag/$asset"
          $zipPath = "$downloadRoot\$asset"

          Write-Host "Downloading forked Mercury modem: $url"
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $downloadRoot -Force

          $modemDir = Get-ChildItem -Path $downloadRoot -Directory -Recurse |
            Where-Object { Test-Path (Join-Path $_.FullName "mercury.exe") } |
            Select-Object -First 1

          if (!$modemDir) {
            Get-ChildItem -Path $downloadRoot -Recurse | ForEach-Object { Write-Host $_.FullName }
            throw "Downloaded Mercury modem package does not contain mercury.exe"
          }

          "MODEM_PACKAGE_DIR=$($modemDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using Mercury modem package from $($modemDir.FullName)"

      - name: Download Hamlib CAT tools
        shell: pwsh
        run: |
          $downloadRoot = "$env:RUNNER_TEMP\hamlib"
          New-Item -ItemType Directory -Force -Path $downloadRoot | Out-Null

          $url = "https://github.com/Hamlib/Hamlib/releases/download/$env:HAMLIB_TAG/$env:HAMLIB_ASSET"
          $zipPath = "$downloadRoot\$env:HAMLIB_ASSET"

          Write-Host "Downloading Hamlib CAT tools: $url"
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $downloadRoot -Force

          $hamlibDir = Get-ChildItem -Path $downloadRoot -Directory -Recurse |
            Where-Object { Test-Path (Join-Path $_.FullName "bin\rigctld.exe") } |
            Select-Object -First 1

          if (!$hamlibDir) {
            Get-ChildItem -Path $downloadRoot -Recurse | ForEach-Object { Write-Host $_.FullName }
            throw "Downloaded Hamlib package does not contain bin\rigctld.exe"
          }

          "HAMLIB_PACKAGE_DIR=$($hamlibDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using Hamlib CAT tools from $($hamlibDir.FullName)"

      - name: Package
        shell: pwsh
        run: |
          $qtRoot = "$env:RUNNER_TEMP\Qt\$env:QT_VERSION"
          $qtTarget = "$qtRoot\${{ matrix.qt_dir }}"
          $qtHost = "$qtRoot\msvc2022_64"
          if (!(Test-Path $qtHost)) {
            $qtHost = $qtTarget
          }
          $shortSha = "${{ github.sha }}".Substring(0, 8)
          $packageName = "mercury-chat-0.1.0-windows-${{ matrix.arch }}-$shortSha"
          $packageDir = "dist\$packageName"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          Copy-Item "build-windows-${{ matrix.arch }}\Release\mercury-chat.exe" $packageDir
          if ($env:MODEM_PACKAGE_DIR -and (Test-Path $env:MODEM_PACKAGE_DIR)) {
            Copy-Item (Join-Path $env:MODEM_PACKAGE_DIR "*") $packageDir -Recurse -Force
          } else {
            throw "MODEM_PACKAGE_DIR was not set or does not exist"
          }

          if ($env:HAMLIB_PACKAGE_DIR -and (Test-Path $env:HAMLIB_PACKAGE_DIR)) {
            $hamlibDest = Join-Path $packageDir "hamlib"
            $hamlibBinDest = Join-Path $hamlibDest "bin"
            New-Item -ItemType Directory -Force -Path $hamlibBinDest | Out-Null
            Copy-Item (Join-Path $env:HAMLIB_PACKAGE_DIR "bin\*.exe") $hamlibBinDest -Force
            Copy-Item (Join-Path $env:HAMLIB_PACKAGE_DIR "bin\*.dll") $hamlibBinDest -Force
            foreach ($license in @("LICENSE.txt", "COPYING.txt", "COPYING.LIB.txt")) {
              $source = Join-Path $env:HAMLIB_PACKAGE_DIR $license
              if (Test-Path $source) {
                Copy-Item $source (Join-Path $hamlibDest $license) -Force
              }
            }
          } else {
            throw "HAMLIB_PACKAGE_DIR was not set or does not exist"
          }

          function Copy-OptionalFile($source, $destDir) {
            if (Test-Path $source) {
              New-Item -ItemType Directory -Force -Path $destDir | Out-Null
              Copy-Item $source $destDir -Force
            } else {
              Write-Warning "Missing optional runtime file: $source"
            }
          }

          function Copy-QtRuntimeManually($qtPrefix, $destDir) {
            foreach ($dll in @(
              "Qt6Core.dll", "Qt6Gui.dll", "Qt6Widgets.dll", "Qt6Network.dll",
              "Qt6Sql.dll", "Qt6Multimedia.dll", "Qt6OpenGL.dll", "Qt6Svg.dll",
              "Qt6Xml.dll", "d3dcompiler_47.dll", "opengl32sw.dll"
            )) {
              Copy-OptionalFile "$qtPrefix\bin\$dll" $destDir
            }

            foreach ($rel in @(
              "platforms\qwindows.dll",
              "styles\qmodernwindowsstyle.dll",
              "sqldrivers\qsqlite.dll",
              "multimedia\ffmpegmediaplugin.dll",
              "multimedia\windowsmediaplugin.dll",
              "tls\qcertonlybackend.dll",
              "tls\qschannelbackend.dll",
              "networkinformation\qnetworklistmanager.dll",
              "imageformats\qgif.dll",
              "imageformats\qico.dll",
              "imageformats\qjpeg.dll",
              "imageformats\qsvg.dll",
              "iconengines\qsvgicon.dll"
            )) {
              Copy-OptionalFile "$qtPrefix\plugins\$rel" "$destDir\plugins\$(Split-Path $rel -Parent)"
            }

            if ($env:VCToolsRedistDir) {
              $crtDir = "$env:VCToolsRedistDir\arm64\Microsoft.VC143.CRT"
              if (Test-Path $crtDir) {
                Copy-Item "$crtDir\*.dll" $destDir -Force
              } else {
                Write-Warning "Missing ARM64 MSVC runtime directory: $crtDir"
              }
            }

            Set-Content -Encoding UTF8 "$destDir\qt.conf" -Value @("[Paths]", "Plugins = plugins")
          }

          $manualDeploy = $false
          if ("${{ matrix.arch }}" -eq "arm64") {
            Write-Warning "Using manual ARM64 runtime copy because target Qt tools cannot run on the x64 runner"
            $manualDeploy = $true
          } else {
            & "$qtTarget\bin\windeployqt.exe" `
              --release `
              --compiler-runtime `
              --no-translations `
              "$packageDir\mercury-chat.exe"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          if ($manualDeploy) {
            Copy-QtRuntimeManually $qtTarget $packageDir
            $global:LASTEXITCODE = 0
          }

          @"
          Mercury Chat Windows ${{ matrix.arch }} package

          Run:
            mercury-chat.exe

          Build metadata:
            Mercury Chat commit: ${{ github.sha }}
            Mercury modem commit: $env:MERCURY_MODEM_COMMIT
            Mercury modem source: https://github.com/$env:MERCURY_MODEM_REPO/releases/tag/$env:MERCURY_MODEM_TAG
            Qt target: $env:QT_VERSION ${{ matrix.qt_arch }}
            Hamlib CAT support: enabled through bundled rigctl/rigctld tools
            Hamlib source: https://github.com/Hamlib/Hamlib/releases/tag/$env:HAMLIB_TAG
            Note: the bundled Mercury modem and Hamlib CAT tools are Windows x64; on Windows ARM64 they run under x64 emulation.
          "@ | Set-Content -Encoding UTF8 "$packageDir\README-WINDOWS.txt"

          Compress-Archive -Path $packageDir -DestinationPath "dist\$packageName.zip" -Force
          "PACKAGE_ZIP=dist\$packageName.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mercury-chat-windows-${{ matrix.arch }}
          path: ${{ env.PACKAGE_ZIP }}
          if-no-files-found: error
